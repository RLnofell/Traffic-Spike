<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAFFIC MONITOR - TERMINAL v1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            background-color: #000;
            color: #00ff41; /* Classic Matrix Green */
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .terminal-container {
            width: 100%;
            max-width: 900px;
            border: 2px solid #00ff41;
            padding: 20px;
            background: #050505;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
        }

        .header {
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            border: 1px solid #00ff41;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .buy-area {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            border: 1px dashed #00ff41;
        }

        .buy-btn {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #00ff41;
        }

        .buy-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Terminal Log Table */
        .log-container {
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #00ff41;
            background: #000;
            padding: 5px;
            font-size: 0.85rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            border-bottom: 1px solid #00ff41;
            padding: 5px;
            color: #fff;
        }

        td {
            padding: 3px 5px;
        }

        .status-200 { color: #00ff41; }
        .status-error { color: #ff3e3e; }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff41;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="terminal-container">
        <div class="header">
            <div>SYSTEM: TRAFFIC_SPIKE_v1.0</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Tickets Sold</span>
                <span class="stat-value" id="ticketCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Avg Latency</span>
                <span class="stat-value" id="latencyVal">0ms</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Requests</span>
                <span class="stat-value" id="totalReq">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label" style="color: #ff3e3e;">Failed (Errors)</span>
                <span class="stat-value" id="failedReq" style="color: #ff3e3e;">0</span>
            </div>
        </div>

        <div class="buy-area">
            <p>> Ready for input...<span class="cursor"></span></p>
            <button class="buy-btn" id="buyBtn" onclick="buyTicket()">EXECUTE /BUY_TICKET</button>
            <p id="statusMsg" style="margin-top: 10px; font-size: 0.9rem;">STATUS: IDLE</p>
        </div>

        <div class="log-container">
            <table>
                <thead>
                    <tr>
                        <th>TIMESTAMP</th>
                        <th>METHOD</th>
                        <th>STATUS</th>
                        <th>LATENCY</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <!-- Logs will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ticketEl = document.getElementById('ticketCount');
        const latencyEl = document.getElementById('latencyVal');
        const totalEl = document.getElementById('totalReq');
        const failedEl = document.getElementById('failedReq');
        const statusEl = document.getElementById('statusMsg');
        const logBody = document.getElementById('logBody');
        const btn = document.getElementById('buyBtn');

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                if (!res.ok) throw new Error("TIMEOUT");
                const data = await res.json();

                // Update Stats
                ticketEl.innerText = data.ticketsSold;
                totalEl.innerText = data.totalRequests;
                failedEl.innerText = data.failedRequests;
                latencyEl.innerText = data.avgLatencyMs + "ms";

                // Update Logs
                logBody.innerHTML = '';
                data.logs.reverse().forEach(log => {
                    const row = document.createElement('tr');
                    const isError = log.status >= 400;
                    row.innerHTML = `
                        <td>${log.timestamp}</td>
                        <td>${log.method} ${log.path}</td>
                        <td class="${isError ? 'status-error' : 'status-200'}">${log.status}</td>
                        <td>${log.latency}</td>
                    `;
                    logBody.appendChild(row);
                });

                if (statusEl.innerText.includes("ERR")) {
                    statusEl.innerText = "STATUS: RECONNECTED";
                    statusEl.style.color = "#00ff41";
                }
            } catch (e) {
                statusEl.innerText = "STATUS: CONNECTION_LOST_SERVER_OVERLOADED";
                statusEl.style.color = "#ff3e3e";
            }
        }

        async function buyTicket() {
            btn.disabled = true;
            statusEl.innerText = "STATUS: SENDING_REQUEST...";
            try {
                const res = await fetch('/buy', { method: 'POST' });
                if (!res.ok) throw new Error(res.status);
                statusEl.innerText = "STATUS: SUCCESS_200_OK";
            } catch (e) {
                statusEl.innerText = "STATUS: FAILED_" + e.message;
            } finally {
                setTimeout(() => { btn.disabled = false; }, 200);
                fetchStatus();
            }
        }

        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>
